<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { margin-bottom: 20px; }
        .search-container { position: relative; }
        .ghost-text {
            position: absolute; top: 0; left: 0;
            padding: 12px; font-size: 16px; color: #ccc;
            pointer-events: none; white-space: pre;
            font-family: system-ui, sans-serif;
            border: 2px solid transparent;
        }
        input[type="search"] {
            width: 100%; padding: 12px; font-size: 16px;
            border: 2px solid #ccc; border-radius: 8px;
            background: transparent; position: relative;
        }
        input[type="search"]:focus { outline: none; border-color: #4a90d9; }
        #results { margin-top: 8px; }
        .result-item {
            padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer;
        }
        .result-item:hover { background: #f5f5f5; }
        .result-item.active { background: #e8f0fe; }
        .result-item { transition: background 0.1s; }
        .result-name { font-weight: 500; }
        .result-category { color: #666; font-size: 14px; }
        .result-section { padding: 8px 12px; color: #888; font-size: 13px; font-weight: 600; background: #f9f9f9; }
        mark { background: #fff3cd; padding: 0; font-weight: 500; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body>
    <h1>Product Search</h1>
    <div class="search-container">
        <span id="ghost" class="ghost-text"></span>
        <input type="search"
               id="search-input"
               name="q"
               placeholder="Search products..."
               autocomplete="off"
               autocapitalize="off"
               spellcheck="false"
               enterkeyhint="search"
               hx-get="/search"
               hx-trigger="input changed delay:60ms, search"
               hx-target="#results"
               hx-swap="innerHTML"
               hx-sync="this:replace"
               hx-push-url="false"
               hx-indicator="#spinner">
        <span id="spinner" class="htmx-indicator"> Searching...</span>
    </div>
    <div id="results" aria-live="polite" aria-busy="false"></div>
    <script>
    var activeIdx = -1;
    var latestIssuedQuery = '';
    var input = document.getElementById('search-input');
    var ghost = document.getElementById('ghost');
    var results = document.getElementById('results');

    function setGhostSuffix(suffix) {
        if (!input || !ghost) return;
        if (!input.value) {
            ghost.textContent = '';
            return;
        }
        ghost.textContent = input.value + (suffix || '');
    }

    function resetSelection() {
        activeIdx = -1;
        updateActive(document.querySelectorAll('.result-item'));
    }

    function setBusy(isBusy) {
        if (results) {
            results.setAttribute('aria-busy', isBusy ? 'true' : 'false');
        }
    }

    document.body.addEventListener('htmx:configRequest', function(evt) {
        if (evt.detail.elt !== input) return;

        var trigger = evt.detail.triggeringEvent;
        if (trigger && trigger.isComposing) {
            evt.preventDefault();
            return;
        }

        var query = evt.detail.parameters.q.trim();
        if (!query) {
            latestIssuedQuery = '';
            setBusy(false);
            if (results) results.innerHTML = '';
            if (ghost) ghost.textContent = '';
            evt.preventDefault();
            return;
        }

        latestIssuedQuery = evt.detail.parameters.q;
        setBusy(true);
    });

    document.body.addEventListener('htmx:beforeSwap', function(evt) {
        if (!evt.detail.target || evt.detail.target.id !== 'results') return;
        var req = evt.detail.requestConfig;
        if (!req || !req.parameters) return;
        if ((req.parameters.q || '') !== latestIssuedQuery) {
            evt.detail.shouldSwap = false;
        }
    });

    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id !== 'results') return;
        resetSelection();
        setBusy(false);
        var inner = document.getElementById('results-inner');
        if (!inner) {
            setGhostSuffix('');
            return;
        }
        var suffix = inner.getAttribute('data-ghost') || '';
        setGhostSuffix(suffix);
    });

    document.body.addEventListener('htmx:responseError', function(evt) {
        if (evt.detail.elt !== input) return;
        setBusy(false);
    });

    document.body.addEventListener('htmx:sendError', function(evt) {
        if (evt.detail.elt !== input) return;
        setBusy(false);
    });

    document.body.addEventListener('htmx:timeout', function(evt) {
        if (evt.detail.elt !== input) return;
        setBusy(false);
    });

    input.addEventListener('input', function() {
        resetSelection();
        setGhostSuffix('');
        if (this.value.trim() !== '') return;
        latestIssuedQuery = '';
        setBusy(false);
        if (results) results.innerHTML = '';
        if (window.htmx) htmx.trigger(this, 'htmx:abort');
    });

    input.addEventListener('keydown', function(e) {
        var items = document.querySelectorAll('.result-item');

        if (e.key === 'Tab') {
            if (ghost.textContent && ghost.textContent !== this.value) {
                e.preventDefault();
                this.value = ghost.textContent;
                htmx.trigger(this, 'search');
            }
            return;
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = Math.min(activeIdx + 1, items.length - 1);
            updateActive(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = Math.max(activeIdx - 1, -1);
            updateActive(items);
        } else if (e.key === 'Enter' && activeIdx >= 0 && activeIdx < items.length) {
            e.preventDefault();
            var item = items[activeIdx];
            var nameEl = item.querySelector('.result-name');
            if (nameEl) this.value = nameEl.textContent;
            htmx.trigger(item, 'click');
            activeIdx = -1;
            updateActive(items);
        } else if (e.key === 'Escape') {
            activeIdx = -1;
            updateActive(items);
        }
    });

    function updateActive(items) {
        items.forEach(function(el, i) {
            el.classList.toggle('active', i === activeIdx);
        });
    }
    </script>
</body>
</html>
