<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { margin-bottom: 20px; }
        .search-container { position: relative; }
        .ghost-text {
            position: absolute; top: 0; left: 0;
            padding: 12px; font-size: 16px; color: #ccc;
            pointer-events: none; white-space: pre;
            font-family: system-ui, sans-serif;
            border: 2px solid transparent;
        }
        input[type="search"] {
            width: 100%; padding: 12px; font-size: 16px;
            border: 2px solid #ccc; border-radius: 8px;
            background: transparent; position: relative;
        }
        input[type="search"]:focus { outline: none; border-color: #4a90d9; }
        #results { margin-top: 8px; }
        .result-item {
            padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer;
        }
        .result-item:hover { background: #f5f5f5; }
        .result-item.active { background: #e8f0fe; }
        .result-item { transition: background 0.1s; }
        .result-name { font-weight: 500; }
        .result-category { color: #666; font-size: 14px; }
        .result-section { padding: 8px 12px; color: #888; font-size: 13px; font-weight: 600; background: #f9f9f9; }
        mark { background: #fff3cd; padding: 0; font-weight: 500; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body>
    <h1>Product Search</h1>
    <div class="search-container">
        <span id="ghost" class="ghost-text"></span>
        <input type="search"
               id="search-input"
               name="q"
               placeholder="Search products..."
               autocomplete="off"
               hx-get="/search"
               hx-trigger="keyup changed delay:80ms, search"
               hx-target="#results"
               hx-swap="innerHTML"
               hx-push-url="false"
               hx-indicator="#spinner">
        <span id="spinner" class="htmx-indicator"> Searching...</span>
    </div>
    <div id="results"></div>
    <script>
    var activeIdx = -1;

    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id !== 'results') return;
        activeIdx = -1;
        var inner = document.getElementById('results-inner');
        var ghost = document.getElementById('ghost');
        var input = document.getElementById('search-input');
        if (!inner || !ghost || !input) return;
        var suffix = inner.getAttribute('data-ghost') || '';
        ghost.textContent = input.value + suffix;
    });

    document.getElementById('search-input').addEventListener('keydown', function(e) {
        var items = document.querySelectorAll('.result-item');

        if (e.key === 'Tab') {
            var ghost = document.getElementById('ghost');
            if (ghost.textContent && ghost.textContent !== this.value) {
                e.preventDefault();
                this.value = ghost.textContent;
                htmx.trigger(this, 'search');
            }
            return;
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = Math.min(activeIdx + 1, items.length - 1);
            updateActive(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = Math.max(activeIdx - 1, -1);
            updateActive(items);
        } else if (e.key === 'Enter' && activeIdx >= 0 && activeIdx < items.length) {
            e.preventDefault();
            var item = items[activeIdx];
            var nameEl = item.querySelector('.result-name');
            if (nameEl) this.value = nameEl.textContent;
            htmx.trigger(item, 'click');
            activeIdx = -1;
            updateActive(items);
        } else if (e.key === 'Escape') {
            activeIdx = -1;
            updateActive(items);
        }
    });

    function updateActive(items) {
        items.forEach(function(el, i) {
            el.classList.toggle('active', i === activeIdx);
        });
    }
    </script>
</body>
</html>
